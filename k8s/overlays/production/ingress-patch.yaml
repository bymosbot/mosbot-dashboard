apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mosbot-dashboard
  namespace: mosbot
spec:
  rules:
    - host: mosbot.yourdomain.com  # Replace with actual domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mosbot-dashboard
                port:
                  number: 80
